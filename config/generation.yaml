# Generation configuration. Everything configurable, no hardcoded values.

base_model: "black-forest-labs/FLUX.1-dev"

# Sampling
# 768/20 ~3x faster per image than 1024/28 on a T4 (~6-7 min vs ~20), with only
# a small quality drop. Raise back to 1024/28 on a faster GPU or for finals.
width: 768
height: 768
num_inference_steps: 20
guidance_scale: 3.5
seed: null                    # null -> random per image

# LoRA
lora_weight: 0.9

# Memory: load the FLUX transformer in 4-bit NF4 (~6GB) instead of bf16 (~24GB).
# Required on a 16GB T4 / Kaggle's ~29GB RAM; turn off on a >=24GB-VRAM GPU for
# slightly higher fidelity. Override via AICS_LOW_VRAM.
low_vram: true

# Batch behaviour
count: 10                     # default images per run
skip_existing: true           # resume-safe: never overwrite / duplicate

# Output
output_format: "png"
save_metadata: true

# Default negative prompt (FLUX largely ignores negatives without CFG, kept for templates)
negative_prompt: "blurry, low quality, deformed, extra fingers, watermark, text"
