# Generation configuration. Everything configurable, no hardcoded values.

base_model: "black-forest-labs/FLUX.1-dev"

# Sampling
width: 1024
height: 1024
num_inference_steps: 28
guidance_scale: 3.5
seed: null                    # null -> random per image

# LoRA
lora_weight: 0.9

# Batch behaviour
count: 10                     # default images per run
skip_existing: true           # resume-safe: never overwrite / duplicate

# Output
output_format: "png"
save_metadata: true

# Default negative prompt (FLUX largely ignores negatives without CFG, kept for templates)
negative_prompt: "blurry, low quality, deformed, extra fingers, watermark, text"
