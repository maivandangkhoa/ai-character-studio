# All paths are config-driven. No hardcoded paths anywhere in the codebase.
# `drive_root` is resolved per environment; override via env var AICS_DRIVE_ROOT.

# Default Google Drive mount location on Colab.
drive_root: "/content/drive/MyDrive/AICharacter"

# Persistent working dir on Kaggle (no Drive). Outputs/datasets live here.
kaggle_root: "/kaggle/working/AICharacter"

# Local fallback when not running on Colab/RunPod/Kaggle (relative to project root).
local_root: "."

# Base model weights (~24-34GB) are large and re-downloadable, so by default
# they are cached on ephemeral local disk (NOT Drive) to spare Drive quota.
# On Colab/RunPod the models dir lives here; set to "" to keep them under the
# main root (Drive), or override with the AICS_MODEL_CACHE env var.
model_cache_root: "/content/models"

# On Kaggle, cache the big base weights on ephemeral scratch (not the 20GB
# persisted /kaggle/working output). Override with AICS_MODEL_CACHE if needed.
kaggle_model_cache: "/kaggle/temp/models"

# Subdirectories created under the active root.
subdirs:
  datasets: "datasets"
  models: "models"
  loras: "outputs/lora"
  generated: "outputs/generated"
  logs: "outputs/logs"
  cache: "cache"

# Where sd-scripts (kohya FLUX trainer) is cloned/located.
sd_scripts_dir: "third_party/sd-scripts"
sd_scripts_repo: "https://github.com/kohya-ss/sd-scripts.git"
sd_scripts_branch: "sd3"
